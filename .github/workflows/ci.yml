# =============================================================================
# .github/workflows/ci.yml — Pipeline CI principal
# =============================================================================
# Execute le lint et les tests unitaires sur chaque push et PR.
#
# Strategie "Light" :
#   - Pas de tests d'integration (MongoDB en CI = overkill)
#   - Pas de matrix Python multi-versions (focus sur 3.12, version actuelle)
#   - Pas de build Docker (l'image est buildee en local par les devs)
#
# Duree typique : ~1-2 minutes.
# =============================================================================

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:  # permet l'execution manuelle depuis l'interface GitHub

# Annule les anciens runs si un nouveau push arrive sur la meme branche
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Lint : ruff check + ruff format --check
  # ---------------------------------------------------------------------------
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install ruff
        run: pip install ruff>=0.7.0

      - name: Ruff check (linting)
        run: ruff check src/ tests/

  # ---------------------------------------------------------------------------
  # Tests unitaires : pytest -m unit + couverture
  # ---------------------------------------------------------------------------
  test-unit:
    name: Tests unitaires (pytest)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: lint  # Ne lance les tests que si le lint passe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            requirements-test.txt
            requirements-api.txt
            requirements-migration.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Installer les deps applicatives ET de test
          pip install -r requirements-test.txt
          pip install -r requirements-api.txt
          pip install -r requirements-migration.txt

      - name: Run unit tests with coverage
        run: |
          pytest -m unit -v \
            --cov \
            --cov-report=term-missing \
            --cov-report=xml \
            --junitxml=junit.xml

      - name: Upload coverage XML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          retention-days: 30

      - name: Upload junit results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-results
          path: junit.xml
          retention-days: 30
