<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#444"/>
    </marker>
    <style>
      .title { font-family: Arial, sans-serif; font-size: 22px; font-weight: 600; fill: #1a1a1a; }
      .subtitle { font-family: Arial, sans-serif; font-size: 13px; font-weight: 600; fill: #555; }
      .box-title { font-family: Arial, sans-serif; font-size: 14px; font-weight: 600; }
      .box-sub { font-family: Arial, sans-serif; font-size: 11px; font-weight: 400; }
      .layer-label { font-family: Arial, sans-serif; font-size: 12px; font-weight: 600; fill: #888; letter-spacing: 1px; }
      .arr { stroke: #444; stroke-width: 1.5; fill: none; }
    </style>
  </defs>

  <!-- Titre -->
  <text x="450" y="35" class="title" text-anchor="middle">FinSecure Banking — Architecture cible</text>
  <text x="450" y="55" class="subtitle" text-anchor="middle">Plateforme data de détection de fraude</text>

  <!-- Couche 1 : Sources -->
  <text x="40" y="100" class="layer-label">SOURCES</text>
  <rect x="40" y="115" width="200" height="60" rx="8" fill="#F1EFE8" stroke="#888" stroke-width="0.8"/>
  <text x="140" y="140" class="box-title" text-anchor="middle" fill="#2C2C2A">SQLite legacy</text>
  <text x="140" y="158" class="box-sub" text-anchor="middle" fill="#5F5E5A">Système historique agences</text>

  <rect x="340" y="115" width="200" height="60" rx="8" fill="#F1EFE8" stroke="#888" stroke-width="0.8"/>
  <text x="440" y="140" class="box-title" text-anchor="middle" fill="#2C2C2A">Fichiers CSV</text>
  <text x="440" y="158" class="box-sub" text-anchor="middle" fill="#5F5E5A">transactions, users, cards</text>

  <rect x="640" y="115" width="200" height="60" rx="8" fill="#F1EFE8" stroke="#888" stroke-width="0.8"/>
  <text x="740" y="140" class="box-title" text-anchor="middle" fill="#2C2C2A">Fichiers JSON</text>
  <text x="740" y="158" class="box-sub" text-anchor="middle" fill="#5F5E5A">MCC codes, fraud labels</text>

  <!-- Flèches vers Bronze -->
  <line x1="140" y1="175" x2="180" y2="218" class="arr" marker-end="url(#arrow)"/>
  <line x1="440" y1="175" x2="220" y2="218" class="arr" marker-end="url(#arrow)"/>
  <line x1="740" y1="175" x2="260" y2="218" class="arr" marker-end="url(#arrow)"/>

  <!-- Couche 2 : Datalake -->
  <text x="40" y="245" class="layer-label">DATALAKE — Pattern médaillon</text>

  <rect x="40" y="260" width="200" height="60" rx="8" fill="#EEEDFE" stroke="#7F77DD" stroke-width="0.8"/>
  <text x="140" y="285" class="box-title" text-anchor="middle" fill="#26215C">Bronze</text>
  <text x="140" y="303" class="box-sub" text-anchor="middle" fill="#3C3489">Raw historisé Parquet</text>

  <rect x="340" y="260" width="200" height="60" rx="8" fill="#EEEDFE" stroke="#7F77DD" stroke-width="0.8"/>
  <text x="440" y="285" class="box-title" text-anchor="middle" fill="#26215C">Silver</text>
  <text x="440" y="303" class="box-sub" text-anchor="middle" fill="#3C3489">Nettoyé enrichi Hive</text>

  <rect x="640" y="260" width="200" height="60" rx="8" fill="#EEEDFE" stroke="#7F77DD" stroke-width="0.8"/>
  <text x="740" y="285" class="box-title" text-anchor="middle" fill="#26215C">Gold</text>
  <text x="740" y="303" class="box-sub" text-anchor="middle" fill="#3C3489">Datamarts agrégés</text>

  <line x1="240" y1="290" x2="334" y2="290" class="arr" marker-end="url(#arrow)"/>
  <line x1="540" y1="290" x2="634" y2="290" class="arr" marker-end="url(#arrow)"/>

  <text x="450" y="345" class="subtitle" text-anchor="middle" fill="#7F77DD">PySpark sur Hadoop</text>

  <!-- Flèches vers Storage -->
  <line x1="380" y1="320" x2="280" y2="378" class="arr" marker-end="url(#arrow)"/>
  <line x1="500" y1="320" x2="600" y2="378" class="arr" marker-end="url(#arrow)"/>
  <line x1="700" y1="320" x2="600" y2="378" class="arr" marker-end="url(#arrow)"/>
  <line x1="200" y1="320" x2="280" y2="378" class="arr" marker-end="url(#arrow)"/>

  <!-- Couche 3 : Storages -->
  <text x="40" y="385" class="layer-label">STOCKAGES MÉTIER</text>

  <rect x="180" y="395" width="200" height="60" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.8"/>
  <text x="280" y="420" class="box-title" text-anchor="middle" fill="#04342C">Oracle XE</text>
  <text x="280" y="438" class="box-sub" text-anchor="middle" fill="#0F6E56">BDR modélisée Merise</text>

  <rect x="500" y="395" width="200" height="60" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.8"/>
  <text x="600" y="420" class="box-title" text-anchor="middle" fill="#04342C">MongoDB</text>
  <text x="600" y="438" class="box-sub" text-anchor="middle" fill="#0F6E56">Documents enrichis</text>

  <!-- Flèches vers consommateurs -->
  <line x1="230" y1="455" x2="140" y2="503" class="arr" marker-end="url(#arrow)"/>
  <line x1="280" y1="455" x2="440" y2="503" class="arr" marker-end="url(#arrow)"/>
  <line x1="600" y1="455" x2="460" y2="503" class="arr" marker-end="url(#arrow)"/>
  <line x1="650" y1="455" x2="740" y2="503" class="arr" marker-end="url(#arrow)"/>

  <!-- Couche 4 : Consommation -->
  <text x="40" y="510" class="layer-label">CONSOMMATION</text>

  <rect x="40" y="520" width="200" height="60" rx="8" fill="#FAECE7" stroke="#D85A30" stroke-width="0.8"/>
  <text x="140" y="545" class="box-title" text-anchor="middle" fill="#4A1B0C">Power BI</text>
  <text x="140" y="563" class="box-sub" text-anchor="middle" fill="#993C1D">Tableaux de bord métier</text>

  <rect x="340" y="520" width="200" height="60" rx="8" fill="#FAECE7" stroke="#D85A30" stroke-width="0.8"/>
  <text x="440" y="545" class="box-title" text-anchor="middle" fill="#4A1B0C">FastAPI</text>
  <text x="440" y="563" class="box-sub" text-anchor="middle" fill="#993C1D">API REST sécurisée</text>

  <rect x="640" y="520" width="200" height="60" rx="8" fill="#FAECE7" stroke="#D85A30" stroke-width="0.8"/>
  <text x="740" y="545" class="box-title" text-anchor="middle" fill="#4A1B0C">Spark MLlib</text>
  <text x="740" y="563" class="box-sub" text-anchor="middle" fill="#993C1D">Détection de fraude</text>
</svg>
